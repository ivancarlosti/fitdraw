name: Update Excalidraw Version

on:
  schedule:
    - cron: '0 3 * * *' # Every day at 03:00 UTC
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Latest Excalidraw Release Tag
        id: excalidraw_version
        run: |
          LATEST_TAG=$(git ls-remote --tags https://github.com/excalidraw/excalidraw.git | awk -F/ '{print $3}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
          if [ -z "$LATEST_TAG" ]; then
            echo "Error fetching latest Excalidraw version."
            exit 1
          fi
          echo "Latest Excalidraw Tag is: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Get Current Tracked Version
        id: current_version
        run: |
          CURRENT_TAG=$(cat .excalidraw-version 2>/dev/null || echo "none")
          echo "Current tracked Excalidraw Tag is: $CURRENT_TAG"
          echo "tag=$CURRENT_TAG" >> $GITHUB_OUTPUT

      - name: Compare and Update Version File
        id: update_check
        run: |
          LATEST="${{ steps.excalidraw_version.outputs.tag }}"
          CURRENT="${{ steps.current_version.outputs.tag }}"

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "New version found ($LATEST). Updating .excalidraw-version."
            echo "$LATEST" > .excalidraw-version
            echo "should_trigger=true" >> $GITHUB_OUTPUT
          else
            echo "Already tracking the latest Excalidraw version ($CURRENT). No update needed."
            echo "should_trigger=false" >> $GITHUB_OUTPUT
          fi

          # Always trigger on manual workflow_dispatch
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger — forcing rebuild."
            echo "should_trigger=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Changes
        if: steps.update_check.outputs.should_trigger == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .excalidraw-version
          git commit -m "chore: Update Excalidraw version to ${{ steps.excalidraw_version.outputs.tag }}" || echo "No changes to commit"
          git push origin main

      - name: Trigger Release Build
        if: steps.update_check.outputs.should_trigger == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Give GitHub a moment to register the push
          sleep 5
          gh workflow run release_build.yml --ref main
